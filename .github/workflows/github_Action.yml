name: Maven Build + FCLI Setup

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:

  # -----------------------------
  # JOB 1: Maven Build
  # -----------------------------
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Project
        run: |
          mvn clean install -DskipTests


  # -----------------------------
  # JOB 2: FCLI Setup (runs after build)
  # -----------------------------
  fcli-setup:
    needs: build   # 👈 THIS is the key
    runs-on: ubuntu-latest

    steps:
      - name: Install & Verify FCLI
        run: |
          npx @fortify/setup env init --tools=fcli:auto
          eval "$(npx @fortify/setup env shell)"
          fcli --version
