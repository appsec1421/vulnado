name: Maven Build - Self Hosted

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: [self-hosted, Linux, X64, fortify]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Verify Java & Maven
        run: |
          java -version
          mvn -version

      - name: Build Project
        run: |
          mvn clean install -DskipTests
