name: Maven Build (Hosted)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest   # GitHub hosted runner

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Verify Java & Maven
        run: |
          java -version
          mvn -version

      - name: Build Project
        run: |
          mvn clean install -DskipTests
